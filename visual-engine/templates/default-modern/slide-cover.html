{% extends "base.html" %}

{% block head %}
<style>
  .slide {
    width: 1080px;
    height: 1080px;
    background: var(--color-bg);
    font-family: var(--font-heading);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }

  /* Decorative circle */
  .slide::before {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: var(--color-primary);
    opacity: 0.08;
    top: -100px;
    right: -100px;
  }

  .slide::after {
    content: '';
    position: absolute;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: var(--color-accent);
    opacity: 0.1;
    bottom: 100px;
    right: 200px;
  }

  .brand-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 600;
    color: var(--color-primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 40px;
  }

  .brand-tag .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-accent);
  }

  .headline {
    font-size: 64px;
    font-weight: 800;
    color: var(--color-text);
    line-height: 1.1;
    margin-bottom: 24px;
    max-width: 800px;
  }

  .subheadline {
    font-size: 28px;
    font-weight: 400;
    color: var(--color-text-muted);
    line-height: 1.5;
    max-width: 700px;
  }

  .footer {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer .brand-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-muted);
  }

  .footer .swipe {
    font-size: 16px;
    color: var(--color-text-muted);
    opacity: 0.5;
  }

  .icon-area {
    width: 80px;
    height: 80px;
    background: var(--color-primary);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
  }

  .icon-area svg, .icon-area i {
    width: 40px;
    height: 40px;
    color: white;
  }
</style>
<script src="https://unpkg.com/lucide@latest"></script>
{% endblock %}

{% block body %}
<div class="slide">
  <div class="brand-tag">
    <span class="dot"></span>
    {{ brand.name | default('Brand') }}
  </div>

  {% if slide.icon_name %}
  <div class="icon-area">
    <i data-lucide="{{ slide.icon_name }}"></i>
  </div>
  {% endif %}

  <h1 class="headline">{{ slide.headline }}</h1>

  {% if slide.subheadline %}
  <p class="subheadline">{{ slide.subheadline }}</p>
  {% endif %}

  <div class="footer">
    <span class="brand-name">{{ brand.name | default('') }}</span>
    <span class="swipe">Swipe &rarr;</span>
  </div>
</div>
<script>lucide.createIcons();</script>
{% endblock %}
