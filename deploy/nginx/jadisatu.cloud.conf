server {
    listen 80;
    listen [::]:80;
    server_name jadisatu.cloud www.jadisatu.cloud;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jadisatu.cloud www.jadisatu.cloud;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/jadisatu.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jadisatu.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    # ══════════════════════════════════════════
    # STATIC FILES — Dark Mode (original HTML)
    # Served from /var/www/jadisatu.cloud/public (synced by deploy.sh)
    # ══════════════════════════════════════════
    root /var/www/jadisatu.cloud/public;
    index dashboard.html;

    # ══════════════════════════════════════════
    # BACKEND APIs
    # ══════════════════════════════════════════

    # Visual Engine API (port 8100)
    location /api/visual/ {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Hunter Agent API (port 8000)
    location /api/hunter/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ══════════════════════════════════════════
    # NEXT.JS — Light Mode (basePath: /light)
    # ══════════════════════════════════════════

    # All /light/* routes → Next.js
    location /light {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ══════════════════════════════════════════
    # DEFAULT — Static files (Dark Mode)
    # ══════════════════════════════════════════

    # Serve static files, fallback to dashboard.html
    location / {
        try_files $uri $uri/ /dashboard.html;
    }
}
