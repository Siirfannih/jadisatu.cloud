name: Deploy JadisatuOS to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: TypeScript check
        working-directory: nextjs-app
        run: npx tsc --noEmit

      - name: Build check
        working-directory: nextjs-app
        run: npm run build

  deploy:
    name: Deploy to Production VPS
    needs: test
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Deploy application
        run: |
          set -e
          echo "=== Starting deploy at $(date) ==="
          
          # Since this runs directly on the VPS, we go to the actual project folder
          cd /root/jadisatu.cloud
          
          # Force git pull on the VPS's existing clone
          git fetch origin main
          git reset --hard origin/main
          echo "✅ Code updated"
          
          # Install dependencies & build Light Mode
          cd nextjs-app
          npm ci --production=false
          npm run build
          echo "✅ Build complete"
          
          # Restart with PM2
          cd ..
          pm2 restart jadisatu-light 2>/dev/null || pm2 start npm --name jadisatu-light -- start --prefix nextjs-app
          pm2 save
          echo "✅ App restarted"
          echo "=== Deploy finished at $(date) ==="

      - name: Verify deployment
        run: |
          echo "=== PM2 Status ==="
          pm2 status
          echo "=== Health Check ==="
          sleep 3
          curl -sf http://localhost:3000 > /dev/null && echo "✅ App is running on :3000" || (echo "⚠️ App check failed on :3000" && exit 1)

  notify-pr:
    name: Comment Test Results on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deploy Preview\n\n✅ Tests passed. Ready to merge.\n\nMerge to \`main\` to auto-deploy to jadisatu.cloud`
            })
