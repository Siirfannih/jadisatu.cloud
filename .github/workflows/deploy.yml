name: Deploy JadisatuOS to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: TypeScript check (Next.js)
        working-directory: nextjs-app
        run: npx tsc --noEmit

      - name: Build check (Next.js)
        working-directory: nextjs-app
        run: npm run build

      - name: Install dependencies (Mandala Engine)
        working-directory: mandala-engine
        run: npm ci

      - name: TypeScript check (Mandala Engine)
        working-directory: mandala-engine
        run: npx tsc --noEmit

      - name: Build check (Mandala Engine)
        working-directory: mandala-engine
        run: npm run build

  deploy:
    name: Deploy to Production VPS
    needs: test
    runs-on: [self-hosted, linux]
    timeout-minutes: 20

    steps:
      - name: Deploy application
        env:
          HOME: /root
        run: |
          set -e
          echo "=== Starting deploy at $(date) ==="

          # Fix git ownership check (runner user != repo owner)
          git config --global --add safe.directory /root/jadisatu.cloud

          # Since this runs directly on the VPS, we go to the actual project folder
          cd /root/jadisatu.cloud

          # Force git pull on the VPS's existing clone
          git fetch origin main
          git reset --hard origin/main
          echo "✅ Code updated"

          # Load NVM into environment
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          # Install dependencies & build Light Mode
          cd nextjs-app
          npm ci --production=false
          npm run build
          echo "✅ Next.js build complete"

          # Install dependencies & build Mandala Engine
          cd ../mandala-engine
          npm ci
          npm run build
          echo "✅ Mandala Engine build complete"

          # Restart all services with PM2
          cd ..
          npx pm2 reload ecosystem.config.js --update-env || {
            npx pm2 delete all || true
            npx pm2 start ecosystem.config.js
          }
          npx pm2 save
          echo "✅ All services restarted via ecosystem"
          echo "=== Deploy finished at $(date) ==="

      - name: Verify deployment
        env:
          HOME: /root
        run: |
          # Load NVM for pm2
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          echo "=== PM2 Status ==="
          npx pm2 status
          echo "=== Health Check: Next.js ==="
          for i in {1..15}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✅ Next.js is running on :3000"
              break
            fi
            echo "Waiting for Next.js... $i/15"
            sleep 2
          done
          echo "=== Health Check: Mandala Engine ==="
          for i in {1..10}; do
            if curl -sf http://localhost:3100/health > /dev/null; then
              echo "✅ Mandala Engine is running on :3100"
              break
            fi
            echo "Waiting for Mandala Engine... $i/10"
            sleep 2
          done

  notify-pr:
    name: Comment Test Results on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deploy Preview\n\n✅ Tests passed. Ready to merge.\n\nMerge to \`main\` to auto-deploy to jadisatu.cloud`
            })
