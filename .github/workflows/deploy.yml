name: Deploy JadisatuOS to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: TypeScript check
        working-directory: nextjs-app
        run: npx tsc --noEmit

      - name: Build check
        working-directory: nextjs-app
        run: npm run build

  deploy:
    name: Deploy to Production VPS
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH client & test connectivity
        run: |
          sudo apt-get install -y netcat-openbsd
          echo "Testing TCP connectivity to VPS..."
          if nc -z -w 10 ${{ secrets.VPS_HOST }} ${{ secrets.VPS_PORT }}; then
            echo "✅ TCP connection to VPS port ${{ secrets.VPS_PORT }} is OK"
          else
            echo "❌ Cannot reach VPS at ${{ secrets.VPS_HOST }}:${{ secrets.VPS_PORT }}"
            exit 1
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 15m
          debug: true
          script: |
            set -e
            echo "=== Starting deploy at $(date) ==="
            cd /root/jadisatu.cloud

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated"

            # Install dependencies + build
            cd nextjs-app
            npm ci --production=false
            npm run build
            echo "✅ Build complete"

            # Restart with PM2
            cd ..
            pm2 restart jadisatu-light 2>/dev/null || pm2 start npm --name jadisatu-light -- start --prefix nextjs-app
            pm2 save
            echo "✅ App restarted"
            echo "=== Deploy finished at $(date) ==="

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30s
          command_timeout: 2m
          script: |
            echo "=== PM2 Status ==="
            pm2 status
            echo "=== Health Check ==="
            sleep 3
            curl -sf http://localhost:3000 > /dev/null && echo "✅ App is running on :3000" || echo "⚠️ App check failed on :3000"

  notify-pr:
    name: Comment Test Results on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deploy Preview\n\n✅ Tests passed. Ready to merge.\n\nMerge to \`main\` to auto-deploy to jadisatu.cloud`
            })
