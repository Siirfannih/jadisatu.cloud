name: Deploy JadisatuOS to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-app
        run: npm ci

      - name: TypeScript check
        working-directory: nextjs-app
        run: npx tsc --noEmit

      - name: Build check
        working-directory: nextjs-app
        run: npm run build

  deploy:
    name: Deploy to Production VPS
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            cd /root/jadisatu.cloud
            git pull origin main
            cd nextjs-app
            npm ci --production=false
            npm run build
            pm2 restart jadisatu-light || pm2 start npm --name jadisatu-light -- start
            echo "Deploy completed at $(date)"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 1m
          script: |
            pm2 status
            curl -sf http://localhost:3000 > /dev/null && echo "App is running" || echo "App check failed"

  notify-pr:
    name: Comment Test Results on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment PR status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deploy Preview\n\n✅ Tests passed. Ready to merge.\n\nMerge to \`main\` to auto-deploy to jadisatu.cloud`
            })
