name: Agent Task Dispatcher

# Triggers when any agent-routing label is added to an issue
on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  dispatch:
    name: Dispatch to AI Agent
    if: >
      github.event.label.name == 'claude-task' ||
      github.event.label.name == 'gemini-task' ||
      github.event.label.name == 'codex-task'
    runs-on: [self-hosted, Windows]
    timeout-minutes: 90

    steps:
      # ─── 1. Acknowledge ──────────────────────────────────────────────
      - name: Acknowledge task
        id: ack
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            let agent = 'unknown';
            if (labels.includes('claude-task')) agent = 'Claude Code';
            else if (labels.includes('gemini-task')) agent = 'Gemini CLI';
            else if (labels.includes('codex-task')) agent = 'Codex CLI';

            const phase = labels.find(l => l.startsWith('phase-')) || 'unphased';
            const isBlueprint = labels.includes('blueprint');
            const isImpl = labels.includes('implementation');

            core.setOutput('agent', agent);
            core.setOutput('agent_label', labels.find(l => l.endsWith('-task')) || 'claude-task');
            core.setOutput('phase', phase);
            core.setOutput('is_blueprint', isBlueprint.toString());
            core.setOutput('is_implementation', isImpl.toString());

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `**Agent Dispatcher** picked up this task.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Agent | ${agent} |`,
                `| Phase | ${phase} |`,
                `| Type | ${isBlueprint ? 'Blueprint (no code)' : isImpl ? 'Implementation' : 'General'} |`,
                `| Issue | #${context.issue.number} |`,
                ``,
                `Executing now on PC Server...`
              ].join('\n')
            });

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['in-progress']
            });

      # ─── 2. Phase Gate: Check dependencies ───────────────────────────
      - name: Check phase dependencies
        id: phase-gate
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ steps.ack.outputs.phase }}';

            if (phase === 'phase-1' || phase === 'unphased') {
              core.setOutput('can_proceed', 'true');
              return;
            }

            if (phase === 'phase-2') {
              const { data: phase1Issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'phase-1',
                state: 'open'
              });
              if (phase1Issues.length > 0) {
                const blockers = phase1Issues.map(i => `#${i.number} ${i.title}`).join(', ');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `**Blocked**: Phase 2 requires all Phase 1 issues to be closed first.\n\nOpen blockers: ${blockers}\n\nWill auto-retry when dependencies are met.`
                });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'in-progress' }); } catch(e) {}
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['blocked'] });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: '${{ steps.ack.outputs.agent_label }}' }); } catch(e) {}
                core.setOutput('can_proceed', 'false');
                return;
              }
            }

            if (phase === 'phase-3') {
              const { data: phase2Issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'phase-2',
                state: 'open'
              });
              if (phase2Issues.length > 0) {
                const blockers = phase2Issues.map(i => `#${i.number} ${i.title}`).join(', ');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `**Blocked**: Phase 3 requires all Phase 2 issues to be closed first.\n\nOpen blockers: ${blockers}`
                });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'in-progress' }); } catch(e) {}
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['blocked'] });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: '${{ steps.ack.outputs.agent_label }}' }); } catch(e) {}
                core.setOutput('can_proceed', 'false');
                return;
              }
            }

            core.setOutput('can_proceed', 'true');

      # ─── 3. Checkout ─────────────────────────────────────────────────
      - name: Checkout code
        if: steps.phase-gate.outputs.can_proceed == 'true'
        uses: actions/checkout@v4

      # ─── 4. Create branch (implementation only) ──────────────────────
      - name: Create branch
        if: steps.phase-gate.outputs.can_proceed == 'true' && steps.ack.outputs.is_implementation == 'true'
        shell: bash
        run: |
          BRANCH_NAME="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # ─── 5. Build prompt file ────────────────────────────────────────
      - name: Build agent prompt
        if: steps.phase-gate.outputs.can_proceed == 'true'
        shell: bash
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IS_BLUEPRINT: ${{ steps.ack.outputs.is_blueprint }}
          IS_IMPL: ${{ steps.ack.outputs.is_implementation }}
          PHASE: ${{ steps.ack.outputs.phase }}
        run: |
          # Gather blueprint context for phase-2+ tasks
          BLUEPRINT_CONTEXT=""
          if [ "$IS_IMPL" = "true" ] || [ "$PHASE" != "phase-1" ]; then
            if [ -d "docs/blueprints" ]; then
              BLUEPRINT_CONTEXT=$(cat docs/blueprints/*.md 2>/dev/null | head -c 5000 || echo "")
            fi
          fi

          if [ "$IS_BLUEPRINT" = "true" ]; then
            cat > agent-prompt.txt << 'PROMPT_EOF'
          You are a senior product/technical architect working on the JadiSatu platform.
          PROMPT_EOF
            cat >> agent-prompt.txt << PROMPT_EOF

          YOUR TASK: ${ISSUE_TITLE} (Issue #${ISSUE_NUMBER})

          INSTRUCTIONS:
          ${ISSUE_BODY}

          CRITICAL RULES:
          1. READ CLAUDE.md and the existing codebase first
          2. Mandala ALREADY EXISTS as a running system — do NOT propose a new system
          3. Your output must be a comprehensive blueprint document
          4. Save your output to: docs/blueprints/issue-${ISSUE_NUMBER}.md
          5. The blueprint must be actionable — other agents will use it to implement
          6. Reference specific existing files, functions, and APIs in your analysis
          7. Do NOT make implementation changes to application code

          EXISTING MANDALA FILES TO EXAMINE:
          - nextjs-app/src/app/mandala/page.tsx (current Mandala page)
          - mandala-engine/ (existing runtime)
          - Any API routes related to mandala

          OUTPUT FORMAT:
          Create docs/blueprints/issue-${ISSUE_NUMBER}.md with:
          - Executive summary
          - Current state analysis (with file references)
          - Proposed architecture/design
          - Data models (if applicable)
          - API contracts (if applicable)
          - Migration path from current to proposed
          - Dependencies and risks
          PROMPT_EOF
          else
            cat > agent-prompt.txt << PROMPT_EOF
          You are a senior engineer implementing changes on the JadiSatu platform.

          YOUR TASK: ${ISSUE_TITLE} (Issue #${ISSUE_NUMBER})

          INSTRUCTIONS:
          ${ISSUE_BODY}

          BLUEPRINT CONTEXT (from Phase 1):
          ${BLUEPRINT_CONTEXT}

          CRITICAL RULES:
          1. READ CLAUDE.md and existing codebase first
          2. Mandala ALREADY EXISTS — bridge to it, do NOT create parallel systems
          3. Make minimal, focused changes that accomplish the task
          4. Write clean, production-quality code
          5. Do NOT break existing functionality
          6. Reference the blueprint documents in docs/blueprints/ for architecture guidance
          7. Test your changes if possible
          PROMPT_EOF
          fi

          echo "Prompt built ($(wc -c < agent-prompt.txt) bytes)"

      # ─── 6. Execute: Claude Code ─────────────────────────────────────
      - name: Execute with Claude Code
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'claude-task'
        shell: bash
        run: |
          export PATH="/c/Users/MICROSOFT/AppData/Roaming/npm:$PATH"
          echo "Executing with Claude Code..."
          claude --dangerously-skip-permissions -p "$(cat agent-prompt.txt)" --max-turns 30 2>&1 | tee result.txt || true

      # ─── 7. Execute: Gemini CLI ──────────────────────────────────────
      - name: Execute with Gemini CLI
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'gemini-task'
        shell: bash
        run: |
          export PATH="/c/Users/MICROSOFT/AppData/Roaming/npm:$PATH"
          echo "Executing with Gemini CLI..."
          gemini -y -p "$(cat agent-prompt.txt)" 2>&1 | tee result.txt || true

      # ─── 8. Execute: Codex CLI ───────────────────────────────────────
      - name: Execute with Codex CLI
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'codex-task'
        shell: bash
        run: |
          export PATH="/c/Users/MICROSOFT/AppData/Roaming/npm:$PATH"
          echo "Executing with Codex CLI..."
          codex --full-auto -q "$(cat agent-prompt.txt)" 2>&1 | tee result.txt || true

      # ─── 9. Read result ──────────────────────────────────────────────
      - name: Read result
        id: result
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        shell: bash
        run: |
          if [ -f result.txt ]; then
            CONTENT=$(head -c 4000 result.txt)
            if [ -z "$CONTENT" ]; then CONTENT="(empty output)"; fi
            {
              echo "RESULT<<EOF"
              echo "$CONTENT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "RESULT=No output file generated" >> "$GITHUB_OUTPUT"
          fi

      # ─── 10. Commit & PR or push to main ────────────────────────────
      - name: Commit and push changes
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_NAME: ${{ steps.ack.outputs.agent }}
          IS_IMPL: ${{ steps.ack.outputs.is_implementation }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # Clean up temp files
          rm -f agent-prompt.txt result.txt

          git config user.name "Jadisatu Agent Dispatcher"
          git config user.email "agent@jadisatu.cloud"

          git add -A
          if ! git diff --staged --quiet 2>/dev/null; then
            git commit -m "agent(${AGENT_NAME}): #${ISSUE_NUM} - ${ISSUE_TITLE}"

            if [ "$IS_IMPL" = "true" ]; then
              git push -u origin "$BRANCH_NAME"
              gh pr create \
                --title "Agent: ${ISSUE_TITLE}" \
                --body "## Closes #${ISSUE_NUM}

          **Agent**: ${AGENT_NAME}

          ### Review checklist
          - [ ] Code is correct
          - [ ] No security issues
          - [ ] Bridges to existing Mandala runtime
          - [ ] Ready to deploy

          ---
          Generated by Jadisatu Agent Dispatcher" \
                --base main \
                --head "$BRANCH_NAME"
            else
              git push origin main
            fi
          else
            echo "No file changes from agent execution"
          fi

      # ─── 11. Report result ──────────────────────────────────────────
      - name: Report result
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        uses: actions/github-script@v7
        env:
          TASK_RESULT: ${{ steps.result.outputs.RESULT }}
          JOB_STATUS: ${{ job.status }}
          AGENT_NAME: ${{ steps.ack.outputs.agent }}
        with:
          script: |
            const result = process.env.TASK_RESULT || '(no output captured)';
            const success = process.env.JOB_STATUS === 'success';
            const agent = process.env.AGENT_NAME;

            const body = [
              `### ${success ? 'Task Completed' : 'Task Failed'}`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Agent | ${agent} |`,
              `| Status | ${process.env.JOB_STATUS} |`,
              ``,
              `<details><summary>Agent Output</summary>`,
              ``,
              '```',
              result,
              '```',
              `</details>`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'in-progress'
              });
            } catch(e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [success ? 'completed' : 'failed']
            });

            if (success) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
            }

      # ─── 12. Auto-trigger next phase ────────────────────────────────
      - name: Check phase complete and trigger next
        if: always() && steps.phase-gate.outputs.can_proceed == 'true' && job.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const currentPhase = '${{ steps.ack.outputs.phase }}';
            if (!currentPhase || currentPhase === 'unphased') return;

            const phaseNum = parseInt(currentPhase.split('-')[1]);
            const nextPhase = `phase-${phaseNum + 1}`;

            const { data: openInPhase } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: currentPhase,
              state: 'open'
            });

            if (openInPhase.length === 0) {
              console.log(`All ${currentPhase} done. Triggering ${nextPhase}...`);

              // Find blocked next-phase issues
              const { data: blockedIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: `${nextPhase},blocked`,
                state: 'open'
              });

              for (const issue of blockedIssues) {
                console.log(`Unblocking #${issue.number}: ${issue.title}`);
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, name: 'blocked' }); } catch(e) {}

                // Re-add agent label to trigger workflow
                const agentLabel = issue.labels.find(l => l.name.endsWith('-task'));
                if (!agentLabel) {
                  // Default to claude-task if no agent label found
                  await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: ['claude-task'] });
                } else {
                  // Remove and re-add to trigger
                  try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, name: agentLabel.name }); } catch(e) {}
                  await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: [agentLabel.name] });
                }

                await github.rest.issues.createComment({
                  issue_number: issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `**Phase gate cleared.** All ${currentPhase} issues complete. This ${nextPhase} task is now unblocked and queued.`
                });
              }

              // Also check non-blocked next phase issues that need triggering
              const { data: readyIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: nextPhase,
                state: 'open'
              });
              const nonBlocked = readyIssues.filter(i => !i.labels.some(l => l.name === 'blocked'));
              for (const issue of nonBlocked) {
                const hasAgentLabel = issue.labels.some(l => l.name.endsWith('-task'));
                if (!hasAgentLabel) {
                  await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: ['claude-task'] });
                }
              }
            } else {
              console.log(`${openInPhase.length} ${currentPhase} issues still open.`);
            }
