name: Agent Task Runner

on:
  issues:
    types: [labeled]

jobs:
  agent-dispatch:
    name: Dispatch to Agent
    if: github.event.label.name == 'agent-task'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Acknowledge issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Agent picked up this task**\n\nWorking on: #${context.issue.number}\n\nI'll create a PR when ready for your review.`
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['in-progress']
            });

      - name: Create branch
        run: |
          BRANCH_NAME="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # Claude Code SDK akan dipanggil di sini
      # Untuk sekarang, ini placeholder yang akan di-replace
      # dengan actual Claude Code SDK call
      - name: Run Claude Code Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          echo "Body: ${ISSUE_BODY}"
          echo ""
          echo "TODO: Integrate Claude Code SDK here"
          echo "npx @anthropic-ai/claude-code --print \"${ISSUE_BODY}\" --allowedTools Bash,Read,Write,Edit,Glob,Grep"

      - name: Push branch & create PR
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "Jadisatu Agent"
          git config user.email "agent@jadisatu.cloud"

          # Only create PR if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent: implement #${{ github.event.issue.number }} - ${{ github.event.issue.title }}

            Co-Authored-By: Claude Agent <agent@jadisatu.cloud>"

            git push origin "$BRANCH_NAME"

            gh pr create \
              --title "Agent: ${{ github.event.issue.title }}" \
              --body "## Closes #${{ github.event.issue.number }}

            ### Changes
            Implemented by Jadisatu Agent based on issue description.

            ### Review checklist
            - [ ] Code looks correct
            - [ ] No security issues
            - [ ] Ready to deploy

            ---
            🤖 Auto-generated by Jadisatu Agent System" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "No changes to commit"
          fi

      - name: Notify via OpenClaw
        if: always()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30s
          script: |
            STATUS="${{ job.status }}"
            TITLE="${{ github.event.issue.title }}"
            NUM="${{ github.event.issue.number }}"
            bash /root/jadisatu.cloud/deploy/notify.sh "agent-${STATUS}" "Issue #${NUM}: ${TITLE}" ""
