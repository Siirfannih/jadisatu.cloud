name: Agent Task Dispatcher

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  dispatch:
    name: Dispatch to AI Agent
    if: >
      github.event.label.name == 'claude-task' ||
      github.event.label.name == 'gemini-task' ||
      github.event.label.name == 'codex-task'
    runs-on: [self-hosted, Windows]
    timeout-minutes: 90

    steps:
      # ─── 1. Acknowledge ──────────────────────────────────────────────
      - name: Acknowledge task
        id: ack
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map(l => l.name);
            let agent = 'unknown';
            if (labels.includes('claude-task')) agent = 'Claude Code';
            else if (labels.includes('gemini-task')) agent = 'Gemini CLI';
            else if (labels.includes('codex-task')) agent = 'Codex CLI';

            const phase = labels.find(l => l.startsWith('phase-')) || 'unphased';
            const isBlueprint = labels.includes('blueprint');
            const isImpl = labels.includes('implementation');

            core.setOutput('agent', agent);
            core.setOutput('agent_label', labels.find(l => l.endsWith('-task')) || 'claude-task');
            core.setOutput('phase', phase);
            core.setOutput('is_blueprint', isBlueprint.toString());
            core.setOutput('is_implementation', isImpl.toString());

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `**Agent Dispatcher** picked up this task.`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Agent | ${agent} |`,
                `| Phase | ${phase} |`,
                `| Type | ${isBlueprint ? 'Blueprint' : isImpl ? 'Implementation' : 'General'} |`,
                `| Runner | PC Server (Windows) |`,
                ``,
                `Executing now...`
              ].join('\n')
            });

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['in-progress']
            });

      # ─── 2. Phase Gate ───────────────────────────────────────────────
      - name: Check phase dependencies
        id: phase-gate
        uses: actions/github-script@v7
        with:
          script: |
            const phase = '${{ steps.ack.outputs.phase }}';

            if (phase === 'phase-1' || phase === 'unphased') {
              core.setOutput('can_proceed', 'true');
              return;
            }

            if (phase === 'phase-2') {
              const { data: open } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: 'phase-1', state: 'open'
              });
              if (open.length > 0) {
                const blockers = open.map(i => `#${i.number}`).join(', ');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
                  body: `**Blocked**: Phase 1 not complete yet. Waiting on: ${blockers}`
                });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'in-progress' }); } catch(e) {}
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['blocked'] });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: '${{ steps.ack.outputs.agent_label }}' }); } catch(e) {}
                core.setOutput('can_proceed', 'false');
                return;
              }
            }

            if (phase === 'phase-3') {
              const { data: open } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: 'phase-2', state: 'open'
              });
              if (open.length > 0) {
                const blockers = open.map(i => `#${i.number}`).join(', ');
                await github.rest.issues.createComment({
                  issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo,
                  body: `**Blocked**: Phase 2 not complete yet. Waiting on: ${blockers}`
                });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'in-progress' }); } catch(e) {}
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['blocked'] });
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: '${{ steps.ack.outputs.agent_label }}' }); } catch(e) {}
                core.setOutput('can_proceed', 'false');
                return;
              }
            }

            core.setOutput('can_proceed', 'true');

      # ─── 3. Checkout ─────────────────────────────────────────────────
      - name: Checkout code
        if: steps.phase-gate.outputs.can_proceed == 'true'
        uses: actions/checkout@v4

      # ─── 4. Create branch (implementation only) ──────────────────────
      - name: Create branch
        if: steps.phase-gate.outputs.can_proceed == 'true' && steps.ack.outputs.is_implementation == 'true'
        shell: powershell
        run: |
          $branch = "agent/issue-${{ github.event.issue.number }}"
          # Use -B to force-create (resets if branch already exists from previous run)
          git checkout -B $branch
          "BRANCH_NAME=$branch" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ─── 5. Build prompt ─────────────────────────────────────────────
      - name: Build agent prompt
        if: steps.phase-gate.outputs.can_proceed == 'true'
        shell: powershell
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          IS_BLUEPRINT: ${{ steps.ack.outputs.is_blueprint }}
          IS_IMPL: ${{ steps.ack.outputs.is_implementation }}
          PHASE: ${{ steps.ack.outputs.phase }}
        run: |
          $blueprintCtx = ""
          if (($env:IS_IMPL -eq "true") -or ($env:PHASE -ne "phase-1")) {
            if (Test-Path "docs/blueprints") {
              $blueprintCtx = Get-ChildItem "docs/blueprints/*.md" -ErrorAction SilentlyContinue | ForEach-Object { Get-Content $_ -Raw } | Out-String
              if ($blueprintCtx.Length -gt 5000) { $blueprintCtx = $blueprintCtx.Substring(0, 5000) + "... (truncated)" }
            }
          }

          if ($env:IS_BLUEPRINT -eq "true") {
            $prompt = @"
          You are a senior product/technical architect working on the JadiSatu platform.

          YOUR TASK: $($env:ISSUE_TITLE) (Issue #$($env:ISSUE_NUMBER))

          INSTRUCTIONS:
          $($env:ISSUE_BODY)

          CRITICAL RULES:
          1. READ CLAUDE.md and the existing codebase first
          2. Mandala ALREADY EXISTS as a running system - do NOT propose a new system
          3. Your output must be a comprehensive blueprint document
          4. Save your output to: docs/blueprints/issue-$($env:ISSUE_NUMBER).md
          5. The blueprint must be actionable - other agents will use it to implement
          6. Reference specific existing files, functions, and APIs in your analysis
          7. Do NOT make implementation changes to application code

          EXISTING MANDALA FILES TO EXAMINE:
          - nextjs-app/src/app/mandala/page.tsx (current Mandala page)
          - mandala-engine/ (existing runtime)
          - Any API routes related to mandala

          OUTPUT FORMAT - Create docs/blueprints/issue-$($env:ISSUE_NUMBER).md with:
          - Executive summary
          - Current state analysis (with file references)
          - Proposed architecture/design
          - Data models (if applicable)
          - API contracts (if applicable)
          - Migration path from current to proposed
          - Dependencies and risks
          "@
          } else {
            $prompt = @"
          You are a senior engineer implementing changes on the JadiSatu platform.

          YOUR TASK: $($env:ISSUE_TITLE) (Issue #$($env:ISSUE_NUMBER))

          INSTRUCTIONS:
          $($env:ISSUE_BODY)

          BLUEPRINT CONTEXT (from Phase 1):
          $blueprintCtx

          CRITICAL RULES:
          1. READ CLAUDE.md and existing codebase first
          2. Mandala ALREADY EXISTS - bridge to it, do NOT create parallel systems
          3. Make minimal, focused changes that accomplish the task
          4. Write clean, production-quality code
          5. Do NOT break existing functionality
          6. Reference the blueprint documents in docs/blueprints/ for architecture guidance
          7. Test your changes if possible
          "@
          }

          $prompt | Out-File -FilePath agent-prompt.txt -Encoding utf8
          Write-Host "Prompt built ($($prompt.Length) chars)"

      # ─── 6. Execute: Claude Code ─────────────────────────────────────
      - name: Execute with Claude Code
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'claude-task'
        shell: powershell
        run: |
          $npmPath = "C:\Users\MICROSOFT\AppData\Roaming\npm"
          $env:PATH = "$npmPath;$env:PATH"
          $prompt = Get-Content agent-prompt.txt -Raw
          Write-Host "Executing with Claude Code..."
          & claude --dangerously-skip-permissions -p $prompt --max-turns 30 2>&1 | Tee-Object -FilePath result.txt
          if ($LASTEXITCODE -ne 0) { Write-Host "Claude exited with code $LASTEXITCODE" }

      # ─── 7. Execute: Gemini CLI ──────────────────────────────────────
      - name: Execute with Gemini CLI
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'gemini-task'
        shell: powershell
        run: |
          $npmPath = "C:\Users\MICROSOFT\AppData\Roaming\npm"
          $env:PATH = "$npmPath;$env:PATH"
          # Prevent PS from treating stderr info messages as fatal errors
          $ErrorActionPreference = 'Continue'
          Write-Host "Executing with Gemini CLI (yolo mode)..."
          Get-Content agent-prompt.txt -Raw | & gemini --yolo 2>&1 | Tee-Object -FilePath result.txt
          if ($LASTEXITCODE -ne 0) { Write-Host "Gemini exited with code $LASTEXITCODE"; exit $LASTEXITCODE }

      # ─── 8. Execute: Codex CLI ───────────────────────────────────────
      - name: Execute with Codex CLI
        if: >
          steps.phase-gate.outputs.can_proceed == 'true' &&
          steps.ack.outputs.agent_label == 'codex-task'
        shell: powershell
        run: |
          $npmPath = "C:\Users\MICROSOFT\AppData\Roaming\npm"
          $env:PATH = "$npmPath;$env:PATH"
          # Prevent PS from treating stderr info messages as fatal errors
          $ErrorActionPreference = 'Continue'
          Write-Host "Executing with Codex CLI (exec mode)..."
          Get-Content agent-prompt.txt -Raw | & codex exec - 2>&1 | Tee-Object -FilePath result.txt
          if ($LASTEXITCODE -ne 0) { Write-Host "Codex exited with code $LASTEXITCODE"; exit $LASTEXITCODE }

      # ─── 9. Read result ──────────────────────────────────────────────
      - name: Read result
        id: result
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        shell: powershell
        run: |
          if (Test-Path result.txt) {
            $content = Get-Content result.txt -Raw -ErrorAction SilentlyContinue
            if ($content -and $content.Length -gt 4000) {
              $content = $content.Substring(0, 4000) + "... (truncated)"
            }
            if (-not $content) { $content = "(empty output)" }
            "RESULT<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            $content | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "RESULT=No output file generated" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      # ─── 10. Commit & push ──────────────────────────────────────────
      - name: Commit and push changes
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_NAME: ${{ steps.ack.outputs.agent }}
          IS_IMPL: ${{ steps.ack.outputs.is_implementation }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          Remove-Item agent-prompt.txt -Force -ErrorAction SilentlyContinue
          Remove-Item result.txt -Force -ErrorAction SilentlyContinue

          git config user.name "Jadisatu Agent Dispatcher"
          git config user.email "agent@jadisatu.cloud"

          git add -A
          $null = git diff --staged --quiet 2>&1; $hasChanges = $LASTEXITCODE -ne 0

          if ($hasChanges) {
            git commit -m "agent($($env:AGENT_NAME)): #$($env:ISSUE_NUM) - $($env:ISSUE_TITLE)"

            if ($env:IS_IMPL -eq "true") {
              $branch = $env:BRANCH_NAME
              # Force push: branch may have stale history from a previous failed run
              git push -u origin $branch --force
              $body = "## Closes #$($env:ISSUE_NUM)`n`n**Agent**: $($env:AGENT_NAME)`n`n---`nGenerated by Jadisatu Agent Dispatcher"
              & gh pr create --title "Agent: $($env:ISSUE_TITLE)" --body $body --base main --head $branch
            } else {
              # Blueprint: pull latest then push (avoids non-fast-forward if parallel runs)
              # Use cmd /c to avoid PowerShell treating git stderr as errors
              cmd /c "git pull --rebase origin main 2>&1"
              cmd /c "git push origin main 2>&1"
            }
          } else {
            Write-Host "No file changes from agent execution"
          }

      # ─── 11. Report result ──────────────────────────────────────────
      - name: Report result
        if: always() && steps.phase-gate.outputs.can_proceed == 'true'
        uses: actions/github-script@v7
        env:
          TASK_RESULT: ${{ steps.result.outputs.RESULT }}
          JOB_STATUS: ${{ job.status }}
          AGENT_NAME: ${{ steps.ack.outputs.agent }}
        with:
          script: |
            const result = process.env.TASK_RESULT || '(no output captured)';
            const success = process.env.JOB_STATUS === 'success';
            const agent = process.env.AGENT_NAME;

            const body = [
              `### ${success ? 'Task Completed' : 'Task Failed'}`,
              ``,
              `| Field | Value |`,
              `|-------|-------|`,
              `| Agent | ${agent} |`,
              `| Status | ${process.env.JOB_STATUS} |`,
              ``,
              `<details><summary>Agent Output</summary>`,
              ``,
              '```',
              result,
              '```',
              `</details>`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, name: 'in-progress'
              });
            } catch(e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [success ? 'completed' : 'failed']
            });

            if (success) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, state: 'closed'
              });
            }

      # ─── 12. Auto-trigger next phase ────────────────────────────────
      - name: Trigger next phase if current complete
        if: always() && steps.phase-gate.outputs.can_proceed == 'true' && job.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const currentPhase = '${{ steps.ack.outputs.phase }}';
            if (!currentPhase || currentPhase === 'unphased') return;

            const phaseNum = parseInt(currentPhase.split('-')[1]);
            const nextPhase = `phase-${phaseNum + 1}`;

            const { data: openInPhase } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: currentPhase, state: 'open'
            });

            if (openInPhase.length === 0) {
              console.log(`All ${currentPhase} done! Triggering ${nextPhase}...`);

              const { data: nextIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: nextPhase, state: 'open'
              });

              for (const issue of nextIssues) {
                console.log(`Triggering #${issue.number}: ${issue.title}`);

                // Remove blocked if present
                try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, name: 'blocked' }); } catch(e) {}

                // Find or assign agent label
                const existing = issue.labels.find(l => l.name.endsWith('-task'));
                if (existing) {
                  // Remove and re-add to trigger workflow
                  try { await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, name: existing.name }); } catch(e) {}
                  await new Promise(r => setTimeout(r, 2000));
                  await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: [existing.name] });
                } else {
                  await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, labels: ['claude-task'] });
                }

                await github.rest.issues.createComment({
                  issue_number: issue.number, owner: context.repo.owner, repo: context.repo.repo,
                  body: `**Phase gate cleared.** All ${currentPhase} issues complete. This ${nextPhase} task is now queued.`
                });
              }
            } else {
              console.log(`${openInPhase.length} ${currentPhase} issues still open.`);
            }
