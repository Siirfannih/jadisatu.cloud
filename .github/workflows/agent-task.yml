name: Agent Task Runner

on:
  issues:
    types: [labeled]

jobs:
  agent-dispatch:
    name: Dispatch to Agent
    if: github.event.label.name == 'agent-task'
    # GANTI runs-on ke self-hosted PC Windows kamu
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Acknowledge issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Agent Router picked up this task**\n\nWorking on: #${context.issue.number}\nAnalyzing task to select the best AI Agent (Claude/Gemini/Codex)...\nI'll create a PR when ready for your review.`
            });
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['in-progress']
            });

      - name: Create branch
        id: create-branch
        shell: bash
        run: |
          BRANCH_NAME="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Agent Router & Executor
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          echo "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          
          # SIMPLE ROUTING LOGIC based on tags or keywords in body
          BODY_LOWER=$(echo "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$BODY_LOWER" == *"@gemini"* || "$ISSUE_TITLE" == *"[Gemini]"* ]]; then
            echo "🤖 Router selected: GEMINI CLI"
            echo "Routing reason: Explicit request via keyword/tag"
            
            # Running Gemini with -y (YOLO mode to auto-accept actions) and -p for prompt
            gemini -y -p "READ CLAUDE.md first. Then fix issue: $ISSUE_TITLE. Details: $ISSUE_BODY"
            
          elif [[ "$BODY_LOWER" == *"@codex"* || "$BODY_LOWER" == *"backend"* || "$BODY_LOWER" == *"python"* ]]; then
            echo "🤖 Router selected: CODEX"
            echo "Routing reason: Backend/Python task detected or explicit request"
            
            # Placeholder for Codex execution. 
            # Note: Ensure Codex is configured to run non-interactively in this environment.
            codex --task "Fix issue: $ISSUE_TITLE. Details: $ISSUE_BODY"
            
          else
            echo "🤖 Router selected: CLAUDE CODE (Default)"
            echo "Routing reason: Default frontend/general agent"
            
            # Running Claude with -p (Print responses and execute without interactive workspace trust blocking)
            claude -p "READ CLAUDE.md first. Then implement fixing for this issue: $ISSUE_TITLE. Context: $ISSUE_BODY. You are running autonomously, do not wait for human input, just make the code changes and exit."
          fi

      - name: Push branch & create PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          git config user.name "Jadisatu AI Router"
          git config user.email "agent@jadisatu.cloud"

          # Only create PR if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent: implement #${{ github.event.issue.number }} - ${{ github.event.issue.title }}
            
            Co-Authored-By: Jadisatu AI Router <agent@jadisatu.cloud>"

            git push -u origin "$BRANCH_NAME"

            gh pr create \
              --title "Agent: ${{ github.event.issue.title }}" \
              --body "## Closes #${{ github.event.issue.number }}
              
              ### AI Agent Changes
              Successfully implemented by the Jadisatu Agent Router.
              
              ### Review checklist
              - [ ] Code looks correct
              - [ ] No security issues
              - [ ] Ready to deploy
              
              ---
              🤖 Auto-generated by Jadisatu PR Factory Strategy" \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "No changes to commit from the AI"
          fi
