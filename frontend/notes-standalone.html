<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes — Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
        .note-card:hover { background: #fafafa; }
        .note-content-editable { min-height: 200px; outline: none; }
        .note-content-editable:focus { outline: none; }
        .toolbar-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body class="bg-[#f5f5f7] text-[#1d1d1f] min-h-screen">
    <div id="app" class="max-w-2xl mx-auto px-4 py-8">
        <!-- List View -->
        <div id="list-view">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-[#e8e8ed] flex items-center justify-center">
                        <i data-lucide="file-text" class="w-5 h-5 text-[#1d1d1f]"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-semibold tracking-tight">All Notes</h1>
                        <p id="notes-count" class="text-sm text-[#86868b]">0 Notes</p>
                    </div>
                </div>
                <button type="button" id="btn-sort" class="p-2 rounded-lg hover:bg-white/80 transition-colors" title="Sort">
                    <i data-lucide="sliders-horizontal" class="w-5 h-5 text-[#86868b]"></i>
                </button>
            </div>
            <button type="button" id="btn-new-note" class="w-full py-4 rounded-2xl border-2 border-dashed border-[#d2d2d7] text-[#86868b] hover:border-[#007aff] hover:text-[#007aff] hover:bg-white/50 transition-all flex items-center justify-center gap-2 font-medium mb-6">
                <i data-lucide="plus" class="w-5 h-5"></i>
                New Note
            </button>
            <div id="notes-list" class="space-y-3"></div>
        </div>

        <!-- Detail / Edit View -->
        <div id="detail-view" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <button type="button" id="btn-back" class="p-2 -ml-2 rounded-lg hover:bg-white/80 transition-colors">
                    <i data-lucide="chevron-left" class="w-5 h-5 text-[#1d1d1f]"></i>
                </button>
                <button type="button" id="btn-edit" class="px-4 py-2 rounded-xl bg-[#e8e8ed] hover:bg-[#d2d2d7] text-[#1d1d1f] text-sm font-medium transition-colors">
                    Edit
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-[#e5e5ea] overflow-hidden">
                <div class="p-6">
                    <div id="note-title-display" class="text-xl font-semibold text-[#1d1d1f] mb-1"></div>
                    <div id="note-meta" class="text-sm text-[#86868b] mb-4"></div>
                    <div id="note-title-edit" class="hidden">
                        <input type="text" id="input-title" placeholder="Title" class="w-full text-xl font-semibold border-0 border-b border-[#e5e5ea] focus:border-[#007aff] focus:ring-0 pb-2 outline-none">
                    </div>
                    <div id="note-content-display" class="text-[#1d1d1f] leading-relaxed whitespace-pre-wrap"></div>
                    <div id="note-content-edit" class="hidden">
                        <div id="editor-toolbar" class="flex gap-1 mb-3 border-b border-[#e5e5ea] pb-3">
                            <button type="button" class="toolbar-btn p-2 rounded-lg" data-cmd="bold" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                            <button type="button" class="toolbar-btn p-2 rounded-lg" data-cmd="italic" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
                            <button type="button" class="toolbar-btn p-2 rounded-lg" data-cmd="strikeThrough" title="Strikethrough"><i data-lucide="strikethrough" class="w-4 h-4"></i></button>
                        </div>
                        <div id="input-content" contenteditable="true" class="note-content-editable text-[#1d1d1f] leading-relaxed"></div>
                    </div>
                </div>
                <div id="edit-actions" class="hidden p-4 border-t border-[#e5e5ea] flex justify-end">
                    <button type="button" id="btn-save" class="px-5 py-2.5 rounded-xl bg-[#007aff] text-white text-sm font-medium hover:opacity-90 transition-opacity">
                        Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var STORAGE_KEY = 'notes-standalone-data';
            var notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            var currentNoteId = null;
            var isEditMode = false;

            function uuid() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/x/g, function () { return (Math.random() * 16 | 0).toString(16); });
            }

            function saveToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
            }

            function readingTime(text) {
                if (!text || !text.trim()) return '0 min';
                var words = text.trim().split(/\s+/).length;
                var mins = Math.max(1, Math.ceil(words / 200));
                return mins + ' min' + (mins > 1 ? 's' : '');
            }

            function formatDate(iso) {
                if (!iso) return '';
                var d = new Date(iso);
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-');
            }

            function renderList() {
                var listEl = document.getElementById('notes-list');
                var countEl = document.getElementById('notes-count');
                countEl.textContent = notes.length + ' Note' + (notes.length !== 1 ? 's' : '');

                if (notes.length === 0) {
                    listEl.innerHTML = '<p class="text-center text-[#86868b] py-12">No notes yet. Tap New Note to create one.</p>';
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                    return;
                }

                var icons = ['briefcase', 'palette', 'clipboard-list'];
                var colors = ['bg-[#e8d5f2]', 'bg-[#f5e6c8]', 'bg-[#d5e8f2]'];
                listEl.innerHTML = notes.map(function (note, i) {
                    var icon = icons[i % icons.length];
                    var color = colors[i % colors.length];
                    var preview = (note.content || '').slice(0, 80);
                    if ((note.content || '').length > 80) preview += '...';
                    var time = readingTime(note.content);
                    var date = formatDate(note.updated_at || note.created_at);
                    return '<div class="note-card bg-white rounded-2xl shadow-sm border border-[#e5e5ea] p-4 flex gap-4 cursor-pointer transition-colors" data-note-id="' + note.id + '">' +
                        '<div class="w-14 h-14 rounded-xl ' + color + ' flex items-center justify-center flex-shrink-0">' +
                        '<i data-lucide="' + icon + '" class="w-6 h-6 text-[#1d1d1f]"></i></div>' +
                        '<div class="flex-1 min-w-0">' +
                        '<div class="font-semibold text-[#1d1d1f] truncate">' + (note.title || 'Untitled') + '</div>' +
                        '<div class="text-sm text-[#86868b] line-clamp-2 mt-0.5">' + (preview || 'No content') + '</div>' +
                        '<div class="flex items-center gap-2 mt-2 text-xs text-[#86868b]">' +
                        '<span class="px-2 py-0.5 rounded-md bg-[#f5f5f7]">' + time + '</span>' +
                        '<span>' + date + '</span></div></div></div>';
                }).join('');

                listEl.querySelectorAll('.note-card').forEach(function (el) {
                    el.addEventListener('click', function () {
                        openNote(el.dataset.noteId);
                    });
                });
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            function openNote(id) {
                currentNoteId = id;
                var note = notes.find(function (n) { return n.id === id; });
                if (!note) return;
                document.getElementById('list-view').classList.add('hidden');
                document.getElementById('detail-view').classList.remove('hidden');
                document.getElementById('note-title-display').textContent = note.title || 'Untitled';
                document.getElementById('note-title-display').classList.remove('hidden');
                document.getElementById('note-title-edit').classList.add('hidden');
                document.getElementById('note-content-display').textContent = note.content || '';
                document.getElementById('note-content-display').classList.remove('hidden');
                document.getElementById('note-content-edit').classList.add('hidden');
                document.getElementById('edit-actions').classList.add('hidden');
                document.getElementById('input-title').value = note.title || '';
                document.getElementById('input-content').innerText = note.content || '';
                document.getElementById('note-meta').textContent = readingTime(note.content) + ' · ' + formatDate(note.updated_at || note.created_at);
                isEditMode = false;
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            function setEditMode(editing) {
                isEditMode = editing;
                document.getElementById('note-title-display').classList.toggle('hidden', editing);
                document.getElementById('note-content-display').classList.toggle('hidden', editing);
                document.getElementById('note-title-edit').classList.toggle('hidden', !editing);
                document.getElementById('note-content-edit').classList.toggle('hidden', !editing);
                document.getElementById('edit-actions').classList.toggle('hidden', !editing);
                document.getElementById('btn-edit').textContent = editing ? 'Cancel' : 'Edit';
                if (editing) {
                    var note = notes.find(function (n) { return n.id === currentNoteId; });
                    if (note) {
                        document.getElementById('input-title').value = note.title || '';
                        document.getElementById('input-content').innerText = note.content || '';
                    }
                    document.getElementById('input-title').focus();
                }
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            function saveNote() {
                var note = notes.find(function (n) { return n.id === currentNoteId; });
                if (!note) return;
                note.title = document.getElementById('input-title').value.trim() || 'Untitled';
                note.content = document.getElementById('input-content').innerText.trim();
                note.updated_at = new Date().toISOString();
                saveToStorage();
                setEditMode(false);
                document.getElementById('note-title-display').textContent = note.title;
                document.getElementById('note-content-display').textContent = note.content;
                document.getElementById('note-meta').textContent = readingTime(note.content) + ' · ' + formatDate(note.updated_at);
                renderList();
            }

            function backToList() {
                if (isEditMode && confirm('Discard changes?')) { }
                currentNoteId = null;
                document.getElementById('detail-view').classList.add('hidden');
                document.getElementById('list-view').classList.remove('hidden');
                setEditMode(false);
                renderList();
            }

            function createNewNote() {
                var note = { id: uuid(), title: 'Untitled', content: '', created_at: new Date().toISOString(), updated_at: new Date().toISOString() };
                notes.unshift(note);
                saveToStorage();
                openNote(note.id);
                setEditMode(true);
            }

            document.getElementById('btn-new-note').addEventListener('click', createNewNote);
            document.getElementById('btn-back').addEventListener('click', backToList);
            document.getElementById('btn-edit').addEventListener('click', function () {
                setEditMode(!isEditMode);
            });
            document.getElementById('btn-save').addEventListener('click', saveNote);

            document.querySelectorAll('.toolbar-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var cmd = this.dataset.cmd;
                    document.execCommand(cmd, false, null);
                    document.getElementById('input-content').focus();
                });
            });

            if (notes.length === 0) {
                notes = [
                    { id: uuid(), title: 'Salsile project brief', content: 'No, going all perfect! Let me show you images of the project.', created_at: new Date().toISOString(), updated_at: new Date().toISOString() },
                    { id: uuid(), title: 'Design management', content: 'Track UI components and design tokens for the app.', created_at: new Date().toISOString(), updated_at: new Date().toISOString() },
                    { id: uuid(), title: 'Daily task due', content: 'Review pull requests and update documentation.', created_at: new Date().toISOString(), updated_at: new Date().toISOString() }
                ];
                saveToStorage();
            }
            renderList();
            if (typeof lucide !== 'undefined') lucide.createIcons();
        })();
    </script>
</body>
</html>
