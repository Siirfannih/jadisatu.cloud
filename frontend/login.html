<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — JadiSatu OS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f11 0%, #1a1a2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; }
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .title { text-align: center; color: white; font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #9ca3af; margin-bottom: 32px; }
        .card {
            background: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
        }
        .tabs { display: flex; gap: 8px; padding: 4px; background: rgba(0, 0, 0, 0.3); border-radius: 8px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 12px; border: none; background: transparent; color: #9ca3af; cursor: pointer; border-radius: 6px; font-size: 14px; font-weight: 500; }
        .tab.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .form { display: none; }
        .form.active { display: block; }
        .field { margin-bottom: 16px; }
        label { display: block; color: #d1d5db; font-size: 14px; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button[type="submit"], button[type="button"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .divider { position: relative; margin: 24px 0; text-align: center; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.1); }
        .divider span { position: relative; background: rgba(24, 24, 27, 0.9); padding: 0 12px; color: #6b7280; font-size: 12px; }
        .google-btn { background: white !important; color: #1f2937 !important; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .google-btn:hover { background: #f3f4f6 !important; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171; }
        .success { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #4ade80; }
        .footer { text-align: center; color: #6b7280; font-size: 12px; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">JS</div>
        <h1 class="title">JadiSatu OS</h1>
        <p class="subtitle">Your Life Operating System</p>
        <div class="card">
            <div class="tabs">
                <button class="tab active" id="tab-login">Sign In</button>
                <button class="tab" id="tab-signup">Sign Up</button>
            </div>
            <div id="error" class="message error"></div>
            <div id="success" class="message success"></div>
            <div id="login-form" class="form active">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="login-email" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn">Sign In</button>
            </div>
            <div id="signup-form" class="form">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="signup-email" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="signup-password" required minlength="6" autocomplete="new-password">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" id="signup-confirm" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" id="signup-btn">Create Account</button>
            </div>
            <div class="divider"><span>OR</span></div>
            <button type="button" class="google-btn" id="google-btn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>
        </div>
        <p class="footer">JadiSatu OS — Production</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/debug-logger.js"></script>
    <script src="js/loop-breaker.js"></script>
    <script>
        const client = window.supabase.createClient(
            'https://dwpkokavxjvtrltntjtn.supabase.co',
            'sb_publishable_T5-XcRCVYuXvukpmPSO2cw_JBcOBwD1'
        );
        const DASHBOARD_URL = 'dashboard.html';

        // Check if user is already authenticated (with proper validation)
        async function checkExistingSession() {
            try {
                window.DebugLogger && window.DebugLogger.log('LOGIN: Checking existing session');
                const { data: { session }, error } = await client.auth.getSession();

                // Only redirect if session exists AND is valid
                if (session && !error) {
                    // Verify session is not expired
                    const expiresAt = session.expires_at;
                    const now = Math.floor(Date.now() / 1000);

                    if (expiresAt && expiresAt > now) {
                        console.log('✅ Valid session found, redirecting to dashboard');
                        window.DebugLogger && window.DebugLogger.log('LOGIN: Valid session found, redirecting', { expiresAt, now });

                        // Track redirect with loop breaker
                        if (window.LoopBreaker && window.LoopBreaker.track('login.html', 'dashboard.html')) {
                            console.error('🚨 Loop detected, stopping redirect');
                            return; // Loop detected, stop
                        }

                        window.location.replace(DASHBOARD_URL);
                    } else {
                        console.log('⚠️ Session expired, staying on login');
                        window.DebugLogger && window.DebugLogger.log('LOGIN: Session expired', { expiresAt, now });
                        // Clear expired session
                        await client.auth.signOut();
                    }
                } else {
                    console.log('ℹ️ No valid session, showing login form');
                    window.DebugLogger && window.DebugLogger.log('LOGIN: No valid session', { hasSession: !!session, error });
                }
            } catch (err) {
                console.error('Error checking session:', err);
                window.DebugLogger && window.DebugLogger.log('LOGIN: Error checking session', err);
                // Stay on login page if error
            }
        }

        // Check session on load
        checkExistingSession();
        // Buka tab Sign Up jika URL berakhir dengan #signup (dari landing CTA)
        function openSignupTabIfHash() {
            if (window.location.hash === '#signup') {
                var tabSignup = document.getElementById('tab-signup');
                var tabLogin = document.getElementById('tab-login');
                var signupForm = document.getElementById('signup-form');
                var loginForm = document.getElementById('login-form');
                if (tabSignup && signupForm) {
                    tabSignup.classList.add('active');
                    if (tabLogin) tabLogin.classList.remove('active');
                    signupForm.classList.add('active');
                    if (loginForm) loginForm.classList.remove('active');
                }
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', openSignupTabIfHash);
        } else {
            openSignupTabIfHash();
        }
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }
        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }
        document.getElementById('tab-login').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('tab-signup').classList.remove('active');
            document.getElementById('login-form').classList.add('active');
            document.getElementById('signup-form').classList.remove('active');
            hideMessages();
        });
        document.getElementById('tab-signup').addEventListener('click', function() {
            this.classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('signup-form').classList.add('active');
            document.getElementById('login-form').classList.remove('active');
            hideMessages();
        });
        document.getElementById('login-btn').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showError('Please enter email and password'); return; }
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            try {
                window.DebugLogger && window.DebugLogger.log('LOGIN: User clicked login button', { email });
                const { error, data } = await client.auth.signInWithPassword({ email, password });
                if (error) throw error;

                console.log('✅ Login successful, waiting for session to stabilize...');
                window.DebugLogger && window.DebugLogger.log('LOGIN: Login successful, waiting 2s for session propagation');
                btn.textContent = 'Preparing dashboard...';

                // Wait 2 seconds for session to fully propagate to storage
                // This gives time for Supabase to write to localStorage and sync
                await new Promise(resolve => setTimeout(resolve, 2000));

                console.log('✅ Session should be ready, redirecting to dashboard');
                window.DebugLogger && window.DebugLogger.log('LOGIN: Redirecting to dashboard after 2s wait');

                // Track redirect with loop breaker
                if (window.LoopBreaker && window.LoopBreaker.track('login.html', 'dashboard.html')) {
                    console.error('🚨 Loop detected, stopping redirect');
                    return; // Loop detected, stop
                }

                window.location.replace(DASHBOARD_URL);
            } catch (err) {
                showError(err.message || 'Login failed');
                window.DebugLogger && window.DebugLogger.log('LOGIN: Login error', err);
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
        document.getElementById('signup-btn').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            if (!email || !password || !confirm) { showError('Please fill all fields'); return; }
            if (password !== confirm) { showError('Passwords do not match'); return; }
            if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            try {
                const { error } = await client.auth.signUp({ email, password });
                if (error) throw error;
                showSuccess('Account created! Check your email to verify.');
                document.getElementById('signup-email').value = '';
                document.getElementById('signup-password').value = '';
                document.getElementById('signup-confirm').value = '';
                setTimeout(() => document.getElementById('tab-login').click(), 2000);
            } catch (err) {
                showError(err.message || 'Signup failed');
            }
            btn.disabled = false;
            btn.textContent = 'Create Account';
        });
        document.getElementById('google-btn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Redirecting...';
            try {
                const { error } = await client.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.origin + '/' + DASHBOARD_URL }
                });
                if (error) throw error;
            } catch (err) {
                showError(err.message || 'Google login failed');
                btn.disabled = false;
                btn.textContent = 'Continue with Google';
            }
        });
        document.getElementById('login-email').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
        document.getElementById('login-password').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
    </script>
</body>
</html>
